# Test configuration using H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER,KEY
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# JWT config for tests
jwt.secret=test-secret-key-for-integration-tests-only-at-least-32-bytes-long
jwt.expiration-hours=8

# Disable Flyway for integration tests (use Hibernate DDL)
spring.flyway.enabled=false

# Disable Spring AI for tests (no LM Studio endpoint needed)
spring.ai.openai.base-url=http://localhost:9999/v1
spring.ai.openai.api-key=test-key
